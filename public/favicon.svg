<svg width="200" height="200" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Fondo cuadrado redondeado -->
    <rect width="110" height="110" rx="22" fill="#1E3A5F"/>
    <!-- Acento esquina inferior izquierda -->
    <path d="M0,75 L0,88 Q0,110 22,110 L35,110 Z" fill="#2563EB" opacity="0.5"/>
    <!-- Acento esquina superior derecha -->
    <path d="M75,0 L88,0 Q110,0 110,22 L110,35 Z" fill="#2563EB" opacity="0.5"/>
    <!-- Letra A — pata izquierda -->
    <line x1="22" y1="76" x2="42" y2="28" stroke="white" stroke-width="9" stroke-linecap="round"/>
    <!-- Letra A — pata derecha -->
    <line x1="42" y1="28" x2="58" y2="76" stroke="white" stroke-width="9" stroke-linecap="round"/>
    <!-- Letra A — travesaño -->
    <line x1="28" y1="56" x2="52" y2="56" stroke="#60A5FA" stroke-width="7" stroke-linecap="round"/>
    <!-- Letra X — diagonal 1 -->
    <line x1="62" y1="28" x2="88" y2="76" stroke="#93C5FD" stroke-width="9" stroke-linecap="round"/>
    <!-- Letra X — diagonal 2 -->
    <line x1="88" y1="28" x2="62" y2="76" stroke="#93C5FD" stroke-width="9" stroke-linecap="round"/>
</svg>
